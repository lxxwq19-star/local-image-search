name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Setup Node.js 22
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      # ---------------------------------------------------------------
      # Setup Python 3.11
      # ---------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ---------------------------------------------------------------
      # Install Python dependencies
      # torch on macOS includes MPS support (Metal GPU)
      # ---------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision
          pip install "transformers>=4.30.0,<5.0.0" Pillow numpy onnxruntime tokenizers huggingface-hub safetensors pyinstaller
        working-directory: ./
        timeout-minutes: 30

      # ---------------------------------------------------------------
      # NOTE: Models NOT downloaded in CI (unreliable — HF mirror timeouts)
      # User copies models/ via USB to Mac at:  ~/models/
      # clip_server.py auto-detects models in common locations
      # See _find_models_dir() in clip_server.py for full search path
      # ---------------------------------------------------------------

      # ---------------------------------------------------------------
      # PyInstaller: create onedir bundle (folder mode)
      # onedir = more reliable than onefile for large packages like torch
      # Output: dist/clip_server/  (folder with executable + .dylib deps)
      # ---------------------------------------------------------------
      - name: Bundle clip_server with PyInstaller (onedir mode)
        id: pyinstaller
        run: |
          set +e
          echo "=== Running PyInstaller (onedir mode) ==="
          pyinstaller pyinstaller.spec 2>&1 | tee pyinstaller.log
          PY_EXIT=${PIPESTATUS[0]}

          if [ ${PY_EXIT} -eq 0 ] && [ -f dist/clip_server/clip_server ]; then
            echo "bundle_success=true" >> $GITHUB_OUTPUT
            echo "PyInstaller SUCCEEDED"
            echo "Bundle size: $(du -sh dist/clip_server/ | cut -f1)"
            echo "Bundle contents (top-level):"
            ls -la dist/clip_server/ | head -30
          else
            echo "bundle_success=false" >> $GITHUB_OUTPUT
            echo "PyInstaller FAILED (exit code ${PY_EXIT})"
            echo "=== Last 60 lines of log ==="
            tail -60 pyinstaller.log
          fi
          set -e
        working-directory: ./
        continue-on-error: true

      # ---------------------------------------------------------------
      # Copy resources into src-tauri/resources/ for Tauri bundling
      # - If PyInstaller succeeded: copy entire onedir folder
      # - Always copy clip_server.py as fallback
      # ---------------------------------------------------------------
      - name: Prepare Tauri resources
        run: |
          mkdir -p src-tauri/resources/

          # NOTE: Models NOT bundled — user copies via USB to ~/models/
          # clip_server.py auto-detects: ~/models/, ~/.cache/local-image-search/models/, etc.

          if [ "${{ steps.pyinstaller.outputs.bundle_success }}" = "true" ]; then
            # Copy entire onedir folder → resources/clip_server/
            cp -R dist/clip_server src-tauri/resources/clip_server
            chmod +x src-tauri/resources/clip_server/clip_server
            echo "✓ Copied onedir bundle → resources/clip_server/"
            echo "  Bundle size: $(du -sh src-tauri/resources/clip_server/ | cut -f1)"
          else
            echo "⚠ PyInstaller failed — app will require system Python for CLIP search"
          fi

          # Always include .py as fallback (used if no bundled exe found)
          cp clip_server.py src-tauri/resources/clip_server.py
          echo "✓ Copied clip_server.py as fallback"

          echo "Resources contents:"
          find src-tauri/resources/ -type f | head -30
        working-directory: ./

      # ---------------------------------------------------------------
      # Setup Rust (Apple Silicon only)
      # ---------------------------------------------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---------------------------------------------------------------
      # Frontend build
      # ---------------------------------------------------------------
      - name: Install frontend dependencies
        run: npm install
        working-directory: src

      - name: Build frontend
        run: npm run build
        working-directory: src

      # ---------------------------------------------------------------
      # Install Tauri CLI
      # ---------------------------------------------------------------
      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@^2
        working-directory: src-tauri

      # ---------------------------------------------------------------
      # Ensure tauri.conf.json includes resources/
      # ---------------------------------------------------------------
      - name: Configure Tauri resources
        run: |
          python3 -c "
          import json, sys
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          if 'bundle' not in conf:
              conf['bundle'] = {}
          if 'resources' not in conf['bundle']:
              conf['bundle']['resources'] = ['resources/']
              print('Added resources/ to tauri.conf.json')
          else:
              print('resources already configured:', conf['bundle']['resources'])
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2, ensure_ascii=False)
          "
        working-directory: ./

      # ---------------------------------------------------------------
      # Build Tauri app
      # ---------------------------------------------------------------
      - name: Build Tauri app
        run: |
          echo "=== Starting Tauri build ==="
          cd src-tauri
          npx tauri build 2>&1
          TAURI_EXIT=$?
          echo "Tauri build exit code: ${TAURI_EXIT}"
          if [ ${TAURI_EXIT} -ne 0 ]; then
            echo "=== Bundle dir contents ==="
            ls -laR target/release/bundle/ 2>/dev/null || echo "(no bundle dir)"
            exit ${TAURI_EXIT}
          fi
          echo "=== Build output ==="
          ls -la target/release/bundle/dmg/ 2>/dev/null || echo "(no dmg)"
          ls -la target/release/bundle/macos/ 2>/dev/null || echo "(no .app)"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Ad-hoc code sign (prevents "damaged file" error on macOS)
      # Uses "-" identity = local signing, no Developer ID needed
      # Must run BEFORE artifact upload
      # ---------------------------------------------------------------
      - name: Ad-hoc code sign .app
        run: |
          APP="src-tauri/target/release/bundle/macos/LocalImageSearch.app"
          if [ -d "$APP" ]; then
            echo "=== Signing $APP (ad-hoc) ==="
            codesign --force --deep --sign - "$APP"
            echo "=== Verifying signature ==="
            codesign --verify --deep --strict "$APP" 2>&1 || true
            spctl --assess --type execute "$APP" 2>&1 || true
            echo "✓ Ad-hoc signing done"
          else
            echo "⚠ .app not found, skipping codesign"
            ls -la src-tauri/target/release/bundle/macos/ 2>/dev/null || echo "(no macos dir)"
          fi
        working-directory: ./

      # ---------------------------------------------------------------
      # Also sign the .dmg if present (some macOS versions check)
      # ---------------------------------------------------------------
      - name: Ad-hoc code sign .dmg (if present)
        run: |
          DMG="src-tauri/target/release/bundle/dmg/LocalImageSearch.dmg"
          if [ -f "$DMG" ]; then
            echo "=== Signing DMG (ad-hoc) ==="
            codesign --force --sign - "$DMG"
            echo "✓ DMG signed"
          else
            echo "⚠ .dmg not found, skipping"
          fi
        working-directory: ./

      # ---------------------------------------------------------------
      # Upload artifacts
      # ---------------------------------------------------------------
      - name: Upload DMG + .app
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LocalImageSearch-macos-Apple-Silicon-${{ github.run_number }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            MAC_COMPATIBILITY.md
          retention-days: 30

      # ---------------------------------------------------------------
      # On failure: collect diagnostics
      # ---------------------------------------------------------------
      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p diagnostics/
          echo "=== Build info ===" > diagnostics/info.txt
          echo "Commit: ${{ github.sha }}" >> diagnostics/info.txt
          sw_vers >> diagnostics/info.txt 2>/dev/null || true
          python --version >> diagnostics/info.txt 2>/dev/null || true
          rustc --version >> diagnostics/info.txt 2>/dev/null || true
          find src-tauri/target/release/build -name "output.log" -exec cp {} diagnostics/ \; 2>/dev/null || true
          echo "=== Frontend dist ===" > diagnostics/frontend.txt
          ls -la src/dist/ 2>/dev/null >> diagnostics/frontend.txt || echo "(none)" >> diagnostics/frontend.txt
          echo "Diagnostics:"
          ls -la diagnostics/
        working-directory: ./

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-diags-${{ github.run_number }}
          path: diagnostics/
          retention-days: 7
