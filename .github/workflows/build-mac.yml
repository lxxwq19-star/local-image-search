name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Setup Node.js 22 (Node 20 is deprecated on GH Actions)
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      # ---------------------------------------------------------------
      # Setup Python (for clip_server bundling)
      # ---------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ---------------------------------------------------------------
      # Install Python dependencies + PyInstaller
      # NOTE: PyInstaller + torch is notoriously fragile.
      # If PyInstaller fails, the app will use system Python at runtime.
      # ---------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision
          pip install "transformers>=4.30.0,<5.0.0" Pillow numpy onnxruntime tokenizers huggingface-hub safetensors pyinstaller
        working-directory: ./
        timeout-minutes: 30

      # ---------------------------------------------------------------
      # Attempt PyInstaller bundle (best-effort, non-blocking)
      # ---------------------------------------------------------------
      - name: Try to bundle clip_server with PyInstaller
        id: pyinstaller
        run: |
          set +e  # Don't exit on error
          echo "=== Attempting PyInstaller build ==="
          pyinstaller pyinstaller.spec --onefile --distpath dist/clip_server_standalone 2>&1 | tee pyinstaller.log
          PY_EXIT=${PIPESTATUS[0]}
          echo "=== PyInstaller exit code: ${PY_EXIT} ==="

          if [ ${PY_EXIT} -eq 0 ] && [ -f dist/clip_server_standalone/clip_server ]; then
            echo "bundle_success=true" >> $GITHUB_OUTPUT
            file dist/clip_server_standalone/clip_server
            ls -lh dist/clip_server_standalone/clip_server
            echo "PyInstaller SUCCEEDED"
          else
            echo "bundle_success=false" >> $GITHUB_OUTPUT
            echo "PyInstaller FAILED (exit code ${PY_EXIT}) - app will use system Python fallback"
            echo "--- Last 30 lines of PyInstaller log ---"
            tail -30 pyinstaller.log 2>/dev/null || true
          fi
          set -e
        working-directory: ./
        continue-on-error: true

      # ---------------------------------------------------------------
      # Copy resources (standalone exe if built, else .py fallback)
      # ---------------------------------------------------------------
      - name: Prepare Tauri resources
        run: |
          mkdir -p src-tauri/resources/

          # Always copy clip_server.py as fallback
          cp clip_server.py src-tauri/resources/clip_server.py
          echo "Copied clip_server.py as fallback"

          # If PyInstaller succeeded, also copy the bundled executable
          if [ "${{ steps.pyinstaller.outputs.bundle_success }}" = "true" ]; then
            cp dist/clip_server_standalone/clip_server src-tauri/resources/clip_server
            chmod +x src-tauri/resources/clip_server
            echo "Copied BUNDLED clip_server executable"
          else
            echo "NOTE: No bundled executable. Mac users need Python installed."
            echo "Install: brew install python && pip install torch transformers Pillow numpy onnxruntime"
          fi

          ls -la src-tauri/resources/
        working-directory: ./

      # ---------------------------------------------------------------
      # Setup Rust (for Tauri)
      # Apple Silicon only (aarch64-apple-darwin)
      # ---------------------------------------------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---------------------------------------------------------------
      # Frontend: install deps + build
      # ---------------------------------------------------------------
      - name: Install frontend dependencies
        run: npm install
        working-directory: src

      - name: Build frontend
        run: npm run build
        working-directory: src

      # ---------------------------------------------------------------
      # Install Tauri CLI
      # ---------------------------------------------------------------
      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@^2
        working-directory: src-tauri

      # ---------------------------------------------------------------
      # Build Tauri app (macOS .app + DMG)
      # ---------------------------------------------------------------
      - name: Build Tauri app
        run: |
          echo "=== Starting Tauri build for macOS ==="
          cd src-tauri
          npx tauri build 2>&1
          TAURI_EXIT=$?
          echo "=== Tauri build exit code: ${TAURI_EXIT} ==="
          if [ ${TAURI_EXIT} -ne 0 ]; then
            echo "=== Checking for partial build output ==="
            ls -la target/release/bundle/ 2>/dev/null || echo "No bundle dir"
            ls -la target/release/bundle/dmg/ 2>/dev/null || echo "No dmg dir"
            ls -la target/release/bundle/macos/ 2>/dev/null || echo "No macos dir"
            exit ${TAURI_EXIT}
          fi
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Upload build artifacts (DMG + .app)
      # ---------------------------------------------------------------
      - name: Upload DMG installer
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LocalImageSearch-macos-Apple-Silicon-${{ github.run_number }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            MAC_COMPATIBILITY.md
          retention-days: 30

      # --------------------------------------------------------------- 
      # On failure: collect & upload diagnostic logs
      # ---------------------------------------------------------------
      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Collecting diagnostics ==="
          mkdir -p diagnostics/
          
          # Rust compiler output
          find src-tauri/target/release/build -name "output.log" -exec cp {} diagnostics/ \; 2>/dev/null || true
          
          # Tauri log
          cat > diagnostics/build-info.txt << EOF
          Build run: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          OS: $(sw_vers)
          Node: $(node --version)
          npm: $(npm --version)
          Rust: $(rustc --version)
          Python: $(python --version)
          Cargo targets: $(rustup target list --installed)
          EOF
          
          # Check what exists in bundle dir
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null > diagnostics/bundle-contents.txt || echo "No bundle dir" > diagnostics/bundle-contents.txt
          
          # frontend dist check
          ls -la src/dist/ 2>/dev/null > diagnostics/frontend-dist.txt || echo "No frontend dist" > diagnostics/frontend-dist.txt
          
          echo "Diagnostics collected:"
          ls -la diagnostics/
        working-directory: ./

      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-diags-macos-${{ github.run_number }}
          path: diagnostics/
          retention-days: 7
