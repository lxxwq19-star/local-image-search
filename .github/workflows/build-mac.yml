name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "transformers>=4.30.0,<5.0.0" Pillow numpy onnxruntime tokenizers huggingface-hub safetensors

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install cargo-tauri --version "^2"
        timeout-minutes: 30

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: src

      - name: Build frontend
        run: npm run build
        working-directory: src

      - name: Build Tauri app (macOS)
        run: cd src-tauri && cargo tauri build
        env:
          CI: true

      - name: Upload DMG installer
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LocalImageSearch-macos-${{ github.run_number }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

      - name: Upload build logs (if failed)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-macos-${{ github.run_number }}
          path: |
            src-tauri/target/release/build/*/output.log
          retention-days: 7
